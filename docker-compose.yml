version: '3.8'

networks:
  harikson-network:
    driver: bridge

# Using local host bind mounts inside ./data directory to route data to mounted block storage

services:
  # 1. Traefik (Reverse Proxy)
  traefik:
    image: traefik:v2.11
    container_name: harikson-traefik
    restart: unless-stopped
    command:
      - '--api.insecure=true'
      - '--api.dashboard=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.tlschallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.email=admin@neuravolt.cloud'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--providers.file.directory=/dynamic'
      - '--providers.file.watch=true'
    ports:
      - '8085:80'
      - '8443:443'
      - '8088:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_DIR:-./data}/traefik:/letsencrypt
      - ./traefik/dynamic.yml:/dynamic/dynamic.yml:ro
    networks:
      - harikson-network

  # 2. Ollama (Shared AI Inference Engine)
  ollama:
    image: ollama/ollama:latest
    container_name: harikson-ollama
    restart: unless-stopped
    ports:
      - '11435:11434'
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ${DATA_DIR:-./data}/ollama:/root/.ollama
    networks:
      - harikson-network
    deploy:
      resources:
        limits:
          cpus: '7.0'
          memory: 12g

  # 3. PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg15
    container_name: harikson-postgres
    restart: unless-stopped
    ports:
      - '5435:5432'
    environment:
      - POSTGRES_USER=neuravolt
      - POSTGRES_PASSWORD=neuravolt_dev_pwd
      - POSTGRES_DB=neuravolt
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - harikson-network
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neuravolt']
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: harikson-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6375:6379'
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    networks:
      - harikson-network
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # 4.5. Orchestrator Service (Container Management API)
  orchestrator:
    build:
      context: ./orchestrator
    container_name: harikson-orchestrator
    restart: unless-stopped
    environment:
      - PORT=5001
      - NODE_ENV=production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/usr/src/app
    networks:
      - harikson-network
    deploy:
      resources:
        limits:
          memory: 512m

  # 5. Tenant API (Control Plane Backend & Shared Gateway)
  tenant-api:
    build:
      context: ./harikson/tenant-api
    container_name: harikson-tenant-api
    restart: unless-stopped
    ports:
      - '3008:3008'
    environment:
      - DATABASE_URL=postgresql://neuravolt:neuravolt_dev_pwd@postgres:5432/neuravolt
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET
      - PORT=3008
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
      - ALLOWED_ORIGINS=https://app.neuravolt.cloud,https://admin.neuravolt.cloud,https://neuravolt.cloud,http://localhost:3002,http://localhost:3018,http://localhost:3028,http://154.201.127.68:3018,http://154.201.127.68:3028
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - harikson-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.tenant-api.rule=Host(`api.neuravolt.cloud`) || Host(`cdn.neuravolt.cloud`)'
      - 'traefik.http.routers.tenant-api.entrypoints=websecure'
      - 'traefik.http.routers.tenant-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.tenant-api.loadbalancer.server.port=3008'
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3008/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 5.5. Admin API (Control Plane Management)
  admin-api:
    build:
      context: ./admin-api
    container_name: harikson-admin-api
    restart: unless-stopped
    ports:
      - '4008:4000'
    environment:
      - DATABASE_URL=postgresql://neuravolt:neuravolt_dev_pwd@postgres:5432/neuravolt
      - JWT_SECRET
      - PORT=4000
      - ALLOWED_ORIGINS=https://app.neuravolt.cloud,https://admin.neuravolt.cloud,https://neuravolt.cloud,http://localhost:3002,http://localhost:3018,http://localhost:3028,http://154.201.127.68:3018,http://154.201.127.68:3028
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - harikson-network
    deploy:
      resources:
        limits:
          memory: 512m

  # 6. Admin Panel (Next.js Dashboard)
  admin-panel:
    build:
      context: ./admin-panel
      args:
        - NEXT_PUBLIC_API_URL=https://api.neuravolt.cloud
    container_name: harikson-admin-panel
    restart: unless-stopped
    command: npx next start -p 3001
    ports:
      - '3018:3001'
    environment:
      - PORT=3001
      - NEXT_PUBLIC_API_URL=https://api.neuravolt.cloud
      - NEXTAUTH_SECRET
      - NEXTAUTH_URL=https://admin.neuravolt.cloud
    networks:
      - harikson-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.admin-panel.rule=Host(`admin.neuravolt.cloud`)'
      - 'traefik.http.routers.admin-panel.entrypoints=websecure'
      - 'traefik.http.routers.admin-panel.tls.certresolver=letsencrypt'
      - 'traefik.http.services.admin-panel.loadbalancer.server.port=3001'
    depends_on:
      - tenant-api

  # 7. User Portal (Next.js App)
  user-portal:
    build:
      context: ./user-portal
      args:
        - NEXT_PUBLIC_API_URL=https://api.neuravolt.cloud
    container_name: harikson-user-portal
    restart: unless-stopped
    command: npx next start -p 3002
    ports:
      - '3028:3002'
    environment:
      - PORT=3002
      - NEXT_PUBLIC_API_URL=https://api.neuravolt.cloud
      - NEXTAUTH_SECRET
      - NEXTAUTH_URL=https://app.neuravolt.cloud
    networks:
      - harikson-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.user-portal.rule=Host(`app.neuravolt.cloud`)'
      - 'traefik.http.routers.user-portal.entrypoints=websecure'
      - 'traefik.http.routers.user-portal.tls.certresolver=letsencrypt'
      - 'traefik.http.services.user-portal.loadbalancer.server.port=3002'
    depends_on:
      - tenant-api
  # 8. Prometheus (Metrics Scraper)
  prometheus:
    image: prom/prometheus:latest
    container_name: harikson-prometheus
    user: '0'
    restart: unless-stopped
    ports:
      - '9098:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DATA_DIR:-./data}/prometheus:/prometheus
    networks:
      - harikson-network

  # 9. Grafana (Dashboard Visualizer)
  grafana:
    image: grafana/grafana:latest
    container_name: harikson-grafana
    user: '0'
    restart: unless-stopped
    ports:
      - '3038:3003'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_password
      - GF_SERVER_HTTP_PORT=3003
    volumes:
      - ${DATA_DIR:-./data}/grafana:/var/lib/grafana
    networks:
      - harikson-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`monitor.neuravolt.cloud`)'
      - 'traefik.http.routers.grafana.entrypoints=websecure'
      - 'traefik.http.routers.grafana.tls.certresolver=letsencrypt'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3003'
