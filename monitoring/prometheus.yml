global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['nv-cadvisor:8080']

  # Admin API Metrics Scraper
  # Authentication: Secured with Bearer Token & IP Whitelist Guard (172.x.x.x internal network)
  # Endpoint: /admin/metrics
  - job_name: 'harikson-admin-api'
    metrics_path: '/admin/metrics'
    bearer_token: 'harikson_prometheus_metrics_secret_token_2026'
    static_configs:
      - targets: ['admin-api:3009']
