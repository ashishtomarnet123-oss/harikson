name: CI

on: [pull_request, push]

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:coverage

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
