apiVersion: v2
name: harikson
description: Production orchestration Helm Chart for Harikson AI SaaS Platform
type: application
version: 1.0.0
appVersion: '1.0.0'
dependencies:
  - name: postgresql-ha
    version: 11.8.7
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql-ha.enabled
  - name: redis
    version: 18.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
