apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-api
  labels:
    app: tenant-api
spec:
  replicas: {{ .Values.tenantApi.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tenant-api
  template:
    metadata:
      labels:
        app: tenant-api
    spec:
      containers:
        - name: tenant-api
          image: "{{ .Values.tenantApi.image.repository }}:{{ .Values.tenantApi.image.tag }}"
          imagePullPolicy: {{ .Values.tenantApi.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.tenantApi.service.port }}
          env:
            - name: PORT
              value: "{{ .Values.tenantApi.service.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: harikson-secrets
                  key: database-url
            - name: DATABASE_READ_URL
              valueFrom:
                secretKeyRef:
                  name: harikson-secrets
                  key: database-read-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: harikson-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: harikson-secrets
                  key: jwt-secret
            - name: PAYMENT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: harikson-secrets
                  key: payment-encryption-key
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.tenantApi.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.tenantApi.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.tenantApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-api
  labels:
    app: tenant-api
spec:
  ports:
    - port: {{ .Values.tenantApi.service.port }}
      targetPort: {{ .Values.tenantApi.service.port }}
  selector:
    app: tenant-api
