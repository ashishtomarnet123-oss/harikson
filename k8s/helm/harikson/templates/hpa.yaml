{{- if .Values.tenantApi.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tenant-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tenant-api
  minReplicas: {{ .Values.tenantApi.hpa.minReplicas }}
  maxReplicas: {{ .Values.tenantApi.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.tenantApi.hpa.targetCPUUtilizationPercentage }}
{{- end }}
