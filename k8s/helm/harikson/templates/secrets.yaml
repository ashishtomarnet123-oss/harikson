apiVersion: v1
kind: Secret
metadata:
  name: harikson-secrets
  labels:
    app.kubernetes.io/name: harikson
type: Opaque
data:
  # Base64 encoded secrets (e.g. JWT secrets, API keys, Webhook secrets)
  jwt-secret: {{ b64enc (default "default_jwt_secret_key_2026_change_me_immediately" .Values.global.jwtSecret) }}
  payment-encryption-key: {{ b64enc (default "default_32_bytes_long_secret_key_!" .Values.global.paymentEncryptionKey) }}
  database-url: {{ b64enc (printf "postgresql://%s:%s@harikson-postgresql-ha-pgpool:5432/neuravolt?sslmode=disable" .Values.global.postgresql.auth.username .Values.global.postgresql.auth.password) }}
  # Read replica point-to endpoint (routed via pgpool for load balancing read traffic)
  database-read-url: {{ b64enc (printf "postgresql://%s:%s@harikson-postgresql-ha-read:5432/neuravolt?sslmode=disable" .Values.global.postgresql.auth.username .Values.global.postgresql.auth.password) }}
  redis-url: {{ b64enc (printf "redis://:%s@harikson-redis-master:6379" .Values.global.redis.auth.password) }}
